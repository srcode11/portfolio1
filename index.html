<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Engineer | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a0f2a 0%, #0f172a 50%, #1e1b4b 100%);
            color: #f1f5f9;
            line-height: 1.6;
            min-height: 100vh;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }

        /* Navbar */
        .navbar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10, 15, 35, 0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(59, 130, 246, 0.3);
            padding: 0.8rem 2rem;
        }
        .nav-container {
            max-width: 1300px; margin: 0 auto;
            display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap;
        }
        .nav-btn {
            background: transparent; border: none; color: #cbd5e1;
            font-size: 1rem; font-weight: 500; padding: 0.6rem 1.5rem;
            border-radius: 40px; cursor: pointer; transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
        }
        .nav-btn i { margin-left: 8px; }
        .nav-btn:hover { background: rgba(59, 130, 246, 0.2); color: #60a5fa; transform: translateY(-2px); }

        .container { max-width: 1300px; margin: 0 auto; padding: 2rem 1.5rem; }

        /* Hero */
        .hero { text-align: center; margin-bottom: 4rem; animation: fadeInUp 0.8s ease; }
        .profile-img {
            width: 150px; height: 150px; border-radius: 50%; object-fit: cover;
            border: 4px solid rgba(59, 130, 246, 0.6);
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.4);
            transition: transform 0.3s;
        }
        .profile-img:hover { transform: scale(1.02); }
        h1 {
            font-size: 2.8rem; font-weight: 800; margin: 1.5rem 0 0.5rem;
            background: linear-gradient(135deg, #ffffff, #60a5fa, #3b82f6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .title { color: #93c5fd; font-size: 1.2rem; margin-bottom: 1rem; }
        .bio { max-width: 650px; margin: 0 auto 1.8rem; color: #cbd5e1; }

        /* Skills */
        .skills-cloud { display: flex; flex-wrap: wrap; gap: 0.8rem; justify-content: center; margin: 1.8rem 0; }
        .skill-tag {
            background: rgba(59, 130, 246, 0.15); backdrop-filter: blur(4px);
            padding: 0.5rem 1.3rem; border-radius: 40px; font-size: 0.85rem;
            border: 1px solid rgba(59, 130, 246, 0.4); transition: all 0.3s;
        }
        .skill-tag:hover { background: #3b82f6; transform: translateY(-2px); }

        /* Social */
        .social-links { display: flex; gap: 1.2rem; justify-content: center; margin-top: 1.8rem; }
        .social-links a {
            background: rgba(255,255,255,0.05); width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
            transition: all 0.3s; border: 1px solid rgba(255,255,255,0.1); color: #cbd5e1;
        }
        .social-links a:hover { background: #3b82f6; color: white; transform: translateY(-4px); }

        /* Sections */
        .section { margin: 5rem 0; scroll-margin-top: 80px; animation: fadeInUp 0.6s ease; }
        .section h2 {
            font-size: 2rem; font-weight: 700; margin-bottom: 2.5rem;
            border-right: 5px solid #3b82f6; padding-right: 1.2rem;
            display: inline-block;
        }

        /* Projects & Certs Grid */
        .projects-grid, .certs-grid, .experiences-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
            margin-top: 1rem;
        }
        .project-card, .cert-card, .experience-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            overflow: hidden;
            transition: all 0.4s;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
        }
        .project-card:hover, .cert-card:hover, .experience-card:hover {
            transform: translateY(-8px);
            border-color: rgba(59,130,246,0.5);
            box-shadow: 0 25px 35px -15px rgba(0,0,0,0.4);
        }
        .project-card img, .cert-card img {
            width: 100%; height: 220px; object-fit: cover;
            transition: transform 0.5s;
        }
        .project-card:hover img { transform: scale(1.05); }
        .project-card h3, .cert-card h4, .experience-card h3 {
            padding: 1.2rem 1.2rem 0.5rem;
            font-size: 1.25rem;
            font-weight: 700;
        }
        .project-card p, .cert-card p, .experience-card p {
            padding: 0 1.2rem 1rem;
            color: #cbd5e1;
            font-size: 0.9rem;
        }
        .project-tech, .exp-tech {
            padding: 0 1.2rem 1.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }
        .tech-badge {
            background: rgba(59,130,246,0.2);
            padding: 0.25rem 0.9rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #93c5fd;
        }
        .exp-company { color: #60a5fa; font-size: 0.9rem; padding: 0 1.2rem 0.5rem; }
        .exp-date { color: #94a3b8; font-size: 0.8rem; padding: 0 1.2rem; }

        /* Delete Button */
        .delete-btn {
            position: absolute; top: 12px; left: 12px;
            background: #ef4444; color: white; border: none;
            border-radius: 50%; width: 34px; height: 34px;
            cursor: pointer; z-index: 10; transition: all 0.2s;
        }
        .delete-btn:hover { background: #dc2626; transform: scale(1.05); }

        /* Modals */
        .modal, .modal-form {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            z-index: 1000;
            overflow-y: auto;
            align-items: center; justify-content: center;
        }
        .modal-content, .form-card {
            background: #0f172a;
            margin: 2rem auto;
            max-width: 850px;
            border-radius: 2rem;
            padding: 2rem;
            position: relative;
            border: 1px solid rgba(59,130,246,0.3);
            animation: scaleIn 0.3s ease;
        }
        .close {
            position: absolute; top: 1rem; right: 1.5rem;
            font-size: 2rem; cursor: pointer; color: #94a3b8;
            transition: 0.2s;
        }
        .close:hover { color: #ef4444; transform: rotate(90deg); }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .gallery-img {
            width: 100%; height: 100px; object-fit: cover;
            border-radius: 1rem; cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .gallery-img:hover { transform: scale(1.02); border-color: #3b82f6; }

        /* Admin Panel */
        .secret-admin { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 99; }
        .secret-btn {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(8px);
            border: 1px solid rgba(59,130,246,0.5); border-radius: 50%;
            width: 52px; height: 52px; cursor: pointer; color: #93c5fd; font-size: 1.3rem;
            transition: 0.3s;
        }
        .secret-btn:hover { background: #3b82f6; color: white; transform: scale(1.05); }
        .admin-panel-hidden {
            position: fixed; bottom: 5.5rem; right: 1.5rem;
            background: #0f172a; backdrop-filter: blur(12px);
            border-radius: 1.2rem; padding: 1rem; width: 260px;
            border: 1px solid rgba(59,130,246,0.4);
            display: none; z-index: 100;
        }
        .admin-panel-hidden.show { display: block; animation: fadeInUp 0.2s; }
        .admin-panel-hidden button {
            width: 100%; margin: 0.5rem 0; padding: 0.6rem;
            background: rgba(255,255,255,0.05); border: none;
            border-radius: 0.8rem; cursor: pointer; font-weight: 500; color: #e2e8f0;
            transition: 0.2s;
        }
        .admin-panel-hidden button:hover { background: #3b82f6; }
        .admin-panel-hidden .danger-btn { background: rgba(239,68,68,0.2); color: #fca5a5; }
        .admin-panel-hidden .danger-btn:hover { background: #ef4444; color: white; }

        /* Forms */
        .form-card input, .form-card textarea {
            width: 100%; margin: 0.6rem 0; padding: 0.8rem 1rem;
            background: #1e293b; border: 1px solid #334155;
            border-radius: 1rem; color: white; font-family: inherit;
        }
        .form-card input:focus, .form-card textarea:focus { outline: none; border-color: #3b82f6; }
        .form-card button {
            margin-top: 1rem;
            background: #3b82f6; color: white; border: none;
            padding: 0.7rem 1.8rem; border-radius: 2rem;
            cursor: pointer; font-weight: 600;
            transition: 0.2s;
        }
        .form-card button:hover { background: #2563eb; transform: scale(1.02); }
        hr { margin: 1rem 0; border-color: #334155; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            h1 { font-size: 2rem; }
            .projects-grid, .certs-grid, .experiences-grid { grid-template-columns: 1fr; }
            .nav-container { gap: 0.8rem; }
            .nav-btn { padding: 0.4rem 1rem; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <button class="nav-btn" onclick="scrollToSection('home')"><i class="fas fa-home"></i> الرئيسية</button>
            <button class="nav-btn" onclick="scrollToSection('projects')"><i class="fas fa-project-diagram"></i> المشاريع</button>
            <button class="nav-btn" onclick="scrollToSection('experience')"><i class="fas fa-briefcase"></i> الخبرات</button>
            <button class="nav-btn" onclick="scrollToSection('certifications')"><i class="fas fa-certificate"></i> الشهادات</button>
        </div>
    </nav>

    <div class="container">
        <div id="home" class="hero">
            <img id="profile-img" class="profile-img" src="https://randomuser.me/api/portraits/women/68.jpg">
            <h1 id="name">جاري التحميل...</h1>
            <div class="title" id="job-title"></div>
            <p class="bio" id="bio"></p>
            <div id="skills-container" class="skills-cloud"></div>
            <div class="social-links">
                <a href="#" id="github"><i class="fab fa-github"></i></a>
                <a href="#" id="linkedin"><i class="fab fa-linkedin-in"></i></a>
                <a href="#" id="twitter"><i class="fab fa-x-twitter"></i></a>
                <a href="#" id="email"><i class="fas fa-envelope"></i></a>
            </div>
        </div>

        <div id="projects" class="section">
            <h2><i class="fas fa-project-diagram"></i> المشاريع</h2>
            <div id="projects-grid" class="projects-grid"></div>
        </div>

        <div id="experience" class="section">
            <h2><i class="fas fa-briefcase"></i> الخبرات العملية</h2>
            <div id="experiences-grid" class="experiences-grid"></div>
        </div>

        <div id="certifications" class="section">
            <h2><i class="fas fa-certificate"></i> الشهادات</h2>
            <div id="certifications-grid" class="certs-grid"></div>
        </div>
    </div>

    <!-- Modals -->
    <div id="project-modal" class="modal"><div class="modal-content"><span class="close">&times;</span><div id="modal-body"></div></div></div>
    <div id="image-modal" class="modal" onclick="closeImageModal()"><div class="modal-content" style="max-width:90%; text-align:center;"><img id="expanded-image" style="max-width:100%; border-radius:1rem;"></div></div>

    <!-- Admin Panel -->
    <div class="secret-admin"><button class="secret-btn" id="secretBtn"><i class="fas fa-lock"></i></button></div>
    <div id="admin-panel-hidden" class="admin-panel-hidden">
        <h3 style="text-align:center; margin-bottom:0.5rem;">الإدارة</h3>
        <button id="editProfileBtn"><i class="fas fa-user-edit"></i> تعديل الملف الشخصي</button>
        <button id="showAddProjectBtn"><i class="fas fa-plus-circle"></i> إضافة مشروع</button>
        <button id="showAddExperienceBtn"><i class="fas fa-briefcase"></i> إضافة خبرة</button>
        <button id="showAddCertBtn"><i class="fas fa-certificate"></i> إضافة شهادة</button>
        <hr><button id="hideAdminBtn" class="danger-btn"><i class="fas fa-lock"></i> إخفاء</button>
    </div>

    <!-- Edit Profile Form -->
    <div id="edit-profile-form" class="modal-form" style="display:none"><div class="form-card"><h3>تعديل الملف الشخصي</h3><input type="text" id="edit-name" placeholder="الاسم"><input type="text" id="edit-job-title" placeholder="المسمى"><textarea id="edit-bio" rows="3" placeholder="نبذة"></textarea><input type="text" id="edit-skills" placeholder="مهارات (مثال: Python, React)"><label>الصورة الشخصية</label><input type="file" id="edit-profile-img" accept="image/*"><input type="text" id="edit-github" placeholder="GitHub"><input type="text" id="edit-linkedin" placeholder="LinkedIn"><input type="text" id="edit-twitter" placeholder="Twitter"><input type="text" id="edit-email" placeholder="Email"><button id="saveProfileBtn">حفظ</button><button id="closeProfileFormBtn">إلغاء</button></div></div>

    <!-- Add Project Form -->
    <div id="add-project-form" class="modal-form" style="display:none"><div class="form-card"><h3>مشروع جديد</h3><input type="text" id="proj-title" placeholder="اسم المشروع"><textarea id="proj-desc" rows="3" placeholder="وصف المشروع"></textarea><input type="text" id="proj-tech" placeholder="التقنيات"><input type="text" id="proj-video" placeholder="رابط فيديو"><label>الصورة الرئيسية</label><input type="file" id="proj-main-img" accept="image/*"><label>صور إضافية</label><input type="file" id="proj-gallery-imgs" multiple accept="image/*"><button id="saveProjectBtn">حفظ</button><button id="closeProjectFormBtn">إلغاء</button></div></div>

    <!-- Add Experience Form -->
    <div id="add-experience-form" class="modal-form" style="display:none"><div class="form-card"><h3>إضافة خبرة جديدة</h3><input type="text" id="exp-title" placeholder="المسمى الوظيفي (مثال: مطورة باك إند)"><input type="text" id="exp-company" placeholder="اسم الشركة"><input type="text" id="exp-date" placeholder="التاريخ (مثال: 2024-2025)"><textarea id="exp-desc" rows="4" placeholder="نقاط الإنجازات (اكتبي كل نقطة في سطر جديد)"></textarea><button id="saveExperienceBtn">حفظ الخبرة</button><button id="closeExperienceFormBtn">إلغاء</button></div></div>

    <!-- Add Certificate Form -->
    <div id="add-cert-form" class="modal-form" style="display:none"><div class="form-card"><h3>شهادة جديدة</h3><input type="text" id="cert-title" placeholder="اسم الشهادة"><input type="text" id="cert-issuer" placeholder="الجهة"><input type="text" id="cert-date" placeholder="التاريخ"><label>صورة الشهادة</label><input type="file" id="cert-image" accept="image/*"><button id="saveCertBtn">حفظ</button><button id="closeCertFormBtn">إلغاء</button></div></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://tauyuehutubsdxrdzyjh.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhdXl1ZWh1dHVic2R4cmR6eWpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MjI5OTIsImV4cCI6MjA5MTQ5ODk5Mn0.AxFy40VrmtbJhIQjeSAzh1i76ZtbHOdSZY3W82i26t8";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const SECRET_CODE = "2026";
        
        function scrollToSection(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth', block: 'start' }); }
        
        // Admin Panel
        const adminPanel = document.getElementById('admin-panel-hidden');
        document.getElementById('secretBtn').onclick = () => { let c = prompt("الرمز السري:"); if(c===SECRET_CODE) adminPanel.classList.add('show'); else if(c) alert("رمز غير صحيح"); };
        document.getElementById('hideAdminBtn').onclick = () => adminPanel.classList.remove('show');
        document.getElementById('editProfileBtn').onclick = () => document.getElementById('edit-profile-form').style.display='flex';
        document.getElementById('showAddProjectBtn').onclick = () => document.getElementById('add-project-form').style.display='flex';
        document.getElementById('showAddExperienceBtn').onclick = () => document.getElementById('add-experience-form').style.display='flex';
        document.getElementById('showAddCertBtn').onclick = () => document.getElementById('add-cert-form').style.display='flex';
        document.getElementById('closeProfileFormBtn').onclick = () => document.getElementById('edit-profile-form').style.display='none';
        document.getElementById('closeProjectFormBtn').onclick = () => document.getElementById('add-project-form').style.display='none';
        document.getElementById('closeExperienceFormBtn').onclick = () => document.getElementById('add-experience-form').style.display='none';
        document.getElementById('closeCertFormBtn').onclick = () => document.getElementById('add-cert-form').style.display='none';
        
        // Load Profile
        async function loadProfile() {
            let { data } = await supabaseClient.from('profile').select('*').single();
            if(data) {
                document.getElementById('name').innerText = data.name || 'فريال الغماري';
                document.getElementById('job-title').innerText = data.job_title || 'مطورة برمجيات';
                document.getElementById('bio').innerText = data.bio || 'أطور حلولاً تقنية مبتكرة';
                if(data.profile_image) document.getElementById('profile-img').src = data.profile_image;
                if(data.skills) document.getElementById('skills-container').innerHTML = (Array.isArray(data.skills)?data.skills:data.skills.split(',')).map(s=>`<span class="skill-tag">${escapeHtml(s.trim())}</span>`).join('');
                document.getElementById('github').href = data.github || '#'; document.getElementById('linkedin').href = data.linkedin || '#'; document.getElementById('twitter').href = data.twitter || '#'; document.getElementById('email').href = `mailto:${data.email || ''}`;
                document.getElementById('edit-name').value = data.name || ''; document.getElementById('edit-job-title').value = data.job_title || ''; document.getElementById('edit-bio').value = data.bio || ''; document.getElementById('edit-skills').value = data.skills ? (Array.isArray(data.skills)?data.skills.join(', '):data.skills) : ''; document.getElementById('edit-github').value = data.github || ''; document.getElementById('edit-linkedin').value = data.linkedin || ''; document.getElementById('edit-twitter').value = data.twitter || ''; document.getElementById('edit-email').value = data.email || '';
            }
        }
        
        // Load Projects
        async function loadProjects() {
            let { data } = await supabaseClient.from('projects').select('*').order('created_at', { ascending: false });
            let container = document.getElementById('projects-grid');
            if(data?.length) {
                container.innerHTML = data.map(p => `<div class="project-card">${adminPanel.classList.contains('show') ? `<button class="delete-btn" onclick="event.stopPropagation(); deleteProject(${p.id})"><i class="fas fa-trash"></i></button>` : ''}<div onclick="showProject(${p.id})"><img src="${p.main_image || ''}" onerror="this.src='https://placehold.co/400x200?text=No+Image'"><h3>${escapeHtml(p.title)}</h3><p>${escapeHtml((p.description||'').substring(0,100))}...</p><div class="project-tech">${p.technologies ? p.technologies.split(',').map(t=>`<span class="tech-badge">${escapeHtml(t.trim())}</span>`).join('') : ''}</div></div></div>`).join('');
            } else container.innerHTML = '<p style="text-align:center;">لا توجد مشاريع بعد</p>';
        }
        
        // Load Experiences
        async function loadExperiences() {
            let { data } = await supabaseClient.from('experiences').select('*').order('created_at', { ascending: false });
            let container = document.getElementById('experiences-grid');
            if(data?.length) {
                container.innerHTML = data.map(exp => `<div class="experience-card">${adminPanel.classList.contains('show') ? `<button class="delete-btn" onclick="event.stopPropagation(); deleteExperience(${exp.id})"><i class="fas fa-trash"></i></button>` : ''}<div><h3>${escapeHtml(exp.title)}</h3><div class="exp-company"><i class="fas fa-building"></i> ${escapeHtml(exp.company)}</div><div class="exp-date"><i class="fas fa-calendar-alt"></i> ${escapeHtml(exp.date || '')}</div><div class="exp-desc-list" style="padding: 0 1.2rem 1.2rem; color:#cbd5e1">${exp.description ? exp.description.map(d => `<li style="margin-right:1rem;">${escapeHtml(d)}</li>`).join('') : ''}</div></div></div>`).join('');
            } else container.innerHTML = '<p style="text-align:center;">لا توجد خبرات مضافة بعد</p>';
        }
        
        // Load Certificates
        async function loadCertificates() {
            let { data } = await supabaseClient.from('certifications').select('*').order('created_at', { ascending: false });
            let container = document.getElementById('certifications-grid');
            if(data?.length) container.innerHTML = data.map(c => `<div class="cert-card"><img src="${c.image_url||''}" onerror="this.src='https://placehold.co/300x200?text=Certificate'"><h4>${escapeHtml(c.title)}</h4><p>${escapeHtml(c.issuer||'')} ${c.date?'| '+c.date:''}</p></div>`).join('');
            else container.innerHTML = '<p style="text-align:center;">لا توجد شهادات بعد</p>';
        }
        
        // Delete Functions
        window.deleteProject = async (id) => { if(confirm("حذف المشروع؟")) { let {error} = await supabaseClient.from('projects').delete().eq('id', id); if(!error) { alert("تم الحذف"); loadProjects(); } else alert("خطأ: "+error.message); } };
        window.deleteExperience = async (id) => { if(confirm("حذف الخبرة؟")) { let {error} = await supabaseClient.from('experiences').delete().eq('id', id); if(!error) { alert("تم الحذف"); loadExperiences(); } else alert("خطأ: "+error.message); } };
        
        // Show Project Modal
        window.showProject = async (id) => {
            let { data } = await supabaseClient.from('projects').select('*').eq('id', id).single();
            if(data) {
                let galleryHtml = '';
                if(data.gallery_images?.length) galleryHtml = `<h4>🖼️ معرض الصور</h4><div class="gallery">${data.gallery_images.map(img=>`<img src="${img}" class="gallery-img" onclick="event.stopPropagation(); openImageModal('${img}')">`).join('')}</div>`;
                document.getElementById('modal-body').innerHTML = `<h2>${escapeHtml(data.title)}</h2>${data.main_image?`<img src="${data.main_image}" style="width:100%; border-radius:1rem; margin:1rem 0; cursor:pointer;" onclick="openImageModal('${data.main_image}')">`:''}<p>${escapeHtml(data.description||'')}</p>${data.technologies?`<h4>🛠️ التقنيات</h4><div class="project-tech">${data.technologies.split(',').map(t=>`<span class="tech-badge">${escapeHtml(t.trim())}</span>`).join('')}</div>`:''}${data.video_url?`<iframe width="100%" height="300" src="${data.video_url.replace('watch?v=','embed/')}" frameborder="0" style="border-radius:1rem; margin:1rem 0;"></iframe>`:''}${galleryHtml}`;
                document.getElementById('project-modal').style.display = 'flex';
            }
        };
        
        window.openImageModal = (src) => { document.getElementById('expanded-image').src = src; document.getElementById('image-modal').style.display = 'flex'; };
        window.closeImageModal = () => document.getElementById('image-modal').style.display = 'none';
        
        // Save Profile
        document.getElementById('saveProfileBtn').onclick = async () => {
            let imgUrl = document.getElementById('profile-img').src;
            let file = document.getElementById('edit-profile-img').files[0];
            if(file) {
                let name = `profile_${Date.now()}_${file.name}`;
                let { data, error } = await supabaseClient.storage.from('project-images').upload(name, file);
                if(data) imgUrl = SUPABASE_URL+`/storage/v1/object/public/project-images/${name}`;
                else { alert("خطأ في رفع الصورة"); return; }
            }
            let skillsArr = document.getElementById('edit-skills').value.split(',').map(s=>s.trim()).filter(s=>s);
            let { error } = await supabaseClient.from('profile').update({ name: document.getElementById('edit-name').value, job_title: document.getElementById('edit-job-title').value, bio: document.getElementById('edit-bio').value, skills: skillsArr, profile_image: imgUrl, github: document.getElementById('edit-github').value, linkedin: document.getElementById('edit-linkedin').value, twitter: document.getElementById('edit-twitter').value, email: document.getElementById('edit-email').value }).eq('id',1);
            if(!error) { alert("تم حفظ الملف الشخصي"); document.getElementById('edit-profile-form').style.display='none'; loadProfile(); } else alert("خطأ: "+error.message);
        };
        
        // Save Project
        document.getElementById('saveProjectBtn').onclick = async () => {
            let title = document.getElementById('proj-title').value;
            if(!title) { alert("أدخلي اسم المشروع"); return; }
            let mainUrl = '';
            let mainFile = document.getElementById('proj-main-img').files[0];
            if(mainFile) {
                let name = `${Date.now()}_main_${mainFile.name}`;
                let { data, error } = await supabaseClient.storage.from('project-images').upload(name, mainFile);
                if(data) mainUrl = SUPABASE_URL+`/storage/v1/object/public/project-images/${name}`;
                else { alert("خطأ في رفع الصورة الرئيسية"); return; }
            } else { alert("اختاري صورة رئيسية"); return; }
            let galleryUrls = [];
            for(let f of document.getElementById('proj-gallery-imgs').files) {
                let name = `${Date.now()}_${f.name}`;
                let { data } = await supabaseClient.storage.from('project-images').upload(name, f);
                if(data) galleryUrls.push(SUPABASE_URL+`/storage/v1/object/public/project-images/${name}`);
            }
            let { error } = await supabaseClient.from('projects').insert({ title, description: document.getElementById('proj-desc').value, technologies: document.getElementById('proj-tech').value, video_url: document.getElementById('proj-video').value, main_image: mainUrl, gallery_images: galleryUrls });
            if(!error) { alert("تمت الإضافة"); document.getElementById('add-project-form').style.display='none'; loadProjects(); } else alert("خطأ: "+error.message);
        };
        
        // Save Experience
        document.getElementById('saveExperienceBtn').onclick = async () => {
            let title = document.getElementById('exp-title').value;
            if(!title) { alert("أدخلي المسمى الوظيفي"); return; }
            let descText = document.getElementById('exp-desc').value;
            let descArray = descText.split('\n').filter(line => line.trim().length > 0);
            let { error } = await supabaseClient.from('experiences').insert({
                title: title,
                company: document.getElementById('exp-company').value,
                date: document.getElementById('exp-date').value,
                description: descArray
            });
            if(!error) { alert("تمت إضافة الخبرة"); document.getElementById('add-experience-form').style.display='none'; loadExperiences(); } else alert("خطأ: "+error.message);
        };
        
        // Save Certificate
        document.getElementById('saveCertBtn').onclick = async () => {
            let title = document.getElementById('cert-title').value;
            if(!title) { alert("أدخلي اسم الشهادة"); return; }
            let imgUrl = '';
            let file = document.getElementById('cert-image').files[0];
            if(file) {
                let name = `${Date.now()}_cert_${file.name}`;
                let { data, error } = await supabaseClient.storage.from('project-images').upload(name, file);
                if(data) imgUrl = SUPABASE_URL+`/storage/v1/object/public/project-images/${name}`;
                else { alert("خطأ في رفع الصورة"); return; }
            } else { alert("اختاري صورة للشهادة"); return; }
            let { error } = await supabaseClient.from('certifications').insert({ title, issuer: document.getElementById('cert-issuer').value, date: document.getElementById('cert-date').value, image_url: imgUrl });
            if(!error) { alert("تمت الإضافة"); document.getElementById('add-cert-form').style.display='none'; loadCertificates(); } else alert("خطأ: "+error.message);
        };
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>{ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        
        window.onclick = (e) => { if(e.target.classList.contains('modal')) e.target.style.display = 'none'; };
        document.querySelectorAll('.close').forEach(btn => btn.onclick = () => document.getElementById('project-modal').style.display='none');
        
        new MutationObserver(() => { loadProjects(); loadExperiences(); }).observe(adminPanel, { attributes: true, attributeFilter: ['class'] });
        loadProfile(); loadProjects(); loadExperiences(); loadCertificates();
    </script>
</body>
</html>
